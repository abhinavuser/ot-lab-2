# Railroad North - Firewall Rules
# IT/OT/DMZ Zone Boundary Enforcement

# IT -> DMZ: Allow specific management ports
ALLOW IT_NET(172.26.0.0/16) to DMZ_NET(172.27.0.0/16) tcp 22,3389,8080,8081

# DMZ -> OT: Allow only Modbus and SCADA
ALLOW DMZ_NET(172.27.0.0/16) to OT_NET(172.25.0.0/16) tcp 502
ALLOW DMZ_NET(172.27.0.0/16) to OT_NET(172.25.0.0/16) tcp 8080

# OT -> DMZ: Allow syslog only
ALLOW OT_NET(172.25.0.0/16) to DMZ_NET(172.27.0.0/16) udp 514

# OT -> OT: Allow all internal traffic
ALLOW OT_NET(172.25.0.0/16) to OT_NET(172.25.0.0/16) all

# OT -> IT: DENY (no direct access)
DENY OT_NET(172.25.0.0/16) to IT_NET(172.26.0.0/16) all

# Default: DENY ALL
DENY all to all all
