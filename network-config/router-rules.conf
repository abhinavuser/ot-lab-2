# Railroad North - Router Rules
# OT Network Routing Configuration

# Master PLC routing
route add -net 172.25.1.0/24 gw 172.25.0.1   # Slave 1 (North)
route add -net 172.25.2.0/24 gw 172.25.0.1   # Slave 2 (Central)
route add -net 172.25.3.0/24 gw 172.25.0.1   # Slave 3 (South)

# DMZ routing
route add -net 172.27.0.0/16 gw 172.25.0.1   # DMZ access via router

# Modbus TCP port restriction
iptables -A FORWARD -p tcp --dport 502 -s 172.25.0.0/16 -j ACCEPT
iptables -A FORWARD -p tcp --dport 502 -s 172.27.0.0/16 -j ACCEPT
iptables -A FORWARD -p tcp --dport 502 -j DROP

# Syslog UDP
iptables -A FORWARD -p udp --dport 514 -j ACCEPT
iptables -A FORWARD -p tcp --dport 5000 -j ACCEPT
